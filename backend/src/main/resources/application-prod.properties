# ============================================================================
# Profile PROD — MySQL. Ative com --spring.profiles.active=prod.
# Segredos vêm SEMPRE de variáveis de ambiente; NUNCA versione credenciais.
# ============================================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Em produção o schema é gerenciado por migrations — apenas valida o mapeamento.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Console H2 desabilitado explicitamente (defesa em profundidade).
spring.h2.console.enabled=false
