spring.application.name=taskflow

# Profile ativo padrão: dev (H2 + console). Em produção, rode com:
#   --spring.profiles.active=prod   (sobrescreve este valor e NÃO expõe o console H2)
spring.profiles.active=dev

# ---- JPA / Hibernate (comum a todos os profiles) ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- CORS (origem do frontend Angular) ----
taskflow.cors.allowed-origin=http://localhost:4200
