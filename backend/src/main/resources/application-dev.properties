# ============================================================================
# Profile DEV — banco H2 em memória + console web.
# O console só fica disponível neste profile (nunca em produção).
# ============================================================================

spring.datasource.url=jdbc:h2:mem:taskflow;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
