spring.application.name=taskflow

# ---- Banco H2 (desenvolvimento, em memória) ----
spring.datasource.url=jdbc:h2:mem:taskflow;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console web do H2: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---- CORS (origem do frontend Angular) ----
taskflow.cors.allowed-origin=http://localhost:4200

# ============================================================================
# Produção (MySQL): ative com --spring.profiles.active=prod e forneça as
# variáveis de ambiente. NUNCA coloque segredos neste arquivo.
